<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff7ed"/>
      <stop offset="0.55" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eff6ff"/>
    </linearGradient>
    <radialGradient id="glow1" cx="22%" cy="26%" r="52%">
      <stop offset="0" stop-color="#ef4444" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#ef4444" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="78%" cy="68%" r="56%">
      <stop offset="0" stop-color="#3b82f6" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="26" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1200" height="900" rx="54" fill="url(#bg)"/>
  <rect width="1200" height="900" rx="54" fill="url(#glow1)"/>
  <rect width="1200" height="900" rx="54" fill="url(#glow2)"/>

  <!-- subtle dot grid -->
  <g opacity="0.18">
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="#0f172a"/>
    </pattern>
    <rect x="0" y="0" width="1200" height="900" fill="url(#dots)"/>
  </g>

  <!-- play card -->
  <g filter="url(#shadow)">
    <rect x="230" y="195" width="740" height="510" rx="56" fill="#ffffff" opacity="0.95"/>
  </g>
  <g>
    <rect x="260" y="225" width="680" height="450" rx="46" fill="#0f172a" opacity="0.04"/>
    <rect x="355" y="310" width="490" height="280" rx="40" fill="#ef4444" opacity="0.12"/>
    <rect x="370" y="324" width="460" height="252" rx="36" fill="#ef4444" opacity="0.10"/>
  </g>
  <g>
    <circle cx="600" cy="450" r="108" fill="#ef4444" opacity="0.14"/>
    <circle cx="600" cy="450" r="92" fill="#ef4444" opacity="0.18"/>
    <path d="M572 400 L572 500 L668 450 Z" fill="#ef4444"/>
  </g>

  <!-- caption -->
  <g opacity="0.9">
    <text x="300" y="742" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="34" font-weight="800" fill="#0f172a">
      YouTube Activity
    </text>
    <text x="300" y="782" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="22" font-weight="600" fill="#334155">
      Audience-first planning / analytics / iteration
    </text>
  </g>
</svg>

